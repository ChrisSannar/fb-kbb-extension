<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root { color-scheme: light dark; }
      body {
        width: 260px;
        margin: 0;
        padding: 12px;
        font: 14px system-ui, sans-serif;
      }
      #loading {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #888;
        padding: 4px 2px 8px;
      }
      .spinner {
        width: 14px;
        height: 14px;
        border: 2px solid rgba(127, 127, 127, 0.35);
        border-top-color: #0b6efd;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      #form { margin: 0 0 4px; }
      label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 8px;
      }
      label input {
        display: block;
        width: 100%;
        box-sizing: border-box;
        margin-top: 2px;
        padding: 6px 8px;
        font: 14px system-ui, sans-serif;
        font-weight: 400;
        border: 1px solid rgba(127, 127, 127, 0.5);
        border-radius: 6px;
        background: Field;
        color: FieldText;
      }
      .row {
        display: block;
        padding: 9px 12px;
        margin-bottom: 6px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 600;
        text-align: center;
      }
      a.row {
        background: #0b6efd;
        color: #fff;
      }
      a.row:hover { background: #0a5ed8; }
      .row.disabled {
        background: rgba(127, 127, 127, 0.18);
        color: #888;
        cursor: default;
      }
      .soon { font-weight: 400; font-size: 12px; }
      #error {
        margin: 4px 0;
        color: #b00020;
        line-height: 1.4;
      }
      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <div id="loading"><span class="spinner"></span> Reading listing…</div>
    <form id="form" class="hidden" autocomplete="off">
      <label>Make <input id="make" list="makes" /></label>
      <label>Model <input id="model" list="models" /></label>
      <label>Year <input id="year" list="years" inputmode="numeric" /></label>
      <label>Style <input id="label" list="labels" placeholder="(optional)" /></label>
      <datalist id="makes"></datalist>
      <datalist id="models"></datalist>
      <datalist id="years"></datalist>
      <datalist id="labels"></datalist>
    </form>
    <p id="error" class="hidden"></p>
    <a id="kbb" class="row hidden" target="_blank" rel="noopener">Check on KBB</a>
    <span class="row disabled">CarComplaints <span class="soon">— soon</span></span>
    <script src="popup.js"></script>
  </body>
</html>
